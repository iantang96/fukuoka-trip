<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helen's Fukuoka Drive 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #2a5298; --secondary-color: #1e3c72; }
        body { background-color: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .hero-section { background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%); color: white; padding: 40px 0; border-radius: 0 0 30px 30px; margin-bottom: 30px; }
        .day-card { border: none; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; transition: transform 0.2s; }
        .day-header { border-radius: 20px 20px 0 0 !important; font-weight: bold; font-size: 1.2rem; }
        .stage-1 { background-color: #e3f2fd; color: #0d47a1; } /* Marinoa */
        .stage-2 { background-color: #fff3e0; color: #e65100; } /* Luigans */
        .stage-3 { background-color: #e8f5e9; color: #1b5e20; } /* Garden Terrace */
        .time-slot { border-left: 3px solid #dee2e6; padding-left: 15px; margin-bottom: 15px; position: relative; }
        .time-label { font-weight: bold; color: #495057; display: block; margin-bottom: 5px; }
        .map-btn { border-radius: 50px; font-size: 0.8rem; padding: 4px 12px; margin-top: 5px; }
        .tips-box { background-color: #fffbe6; border: 1px solid #ffe58f; border-radius: 10px; padding: 10px; font-size: 0.9rem; margin-top: 10px; }
        .done-check { float: right; width: 25px; height: 25px; border-radius: 50%; }
        .strikethrough { text-decoration: line-through; opacity: 0.6; }
    </style>
</head>
